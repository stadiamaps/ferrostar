<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferrostar Replay Tool</title>
    <link
      href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  </head>
  <body>
    <header>
      <h1>Ferrostar Replay Tool</h1>
      <span class="subtitle"
        >Upload a recorded navigation session and replay it in the
        browser.</span
      >
    </header>
    <main>
      <div class="map-column">
        <div class="map-element" id="mapElement"></div>
        <ferrostar-map id="ferrostar"></ferrostar-map>
        <div id="replayControls" class="replay-controls">
          <button id="playPauseBtn" class="control-btn" type="button">
            <i data-lucide="play"></i>
          </button>
          <button id="stopBtn" class="control-btn" type="button">
            <i data-lucide="square"></i>
          </button>
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
          </select>
          <input
            type="range"
            id="progressSlider"
            min="0"
            max="100"
            value="0"
            step="0.1"
          />
          <span id="timeDisplay" class="time">0:00 / 0:00</span>
        </div>
      </div>
      <aside class="sidebar">
        <p>
          <strong>Replay</strong> a recorded Ferrostar navigation session by
          uploading its JSON.
        </p>
        <p>
          <button id="replay" class="upload-btn" type="button">
            Upload JSON
          </button>
          <input
            type="file"
            id="replayFile"
            accept=".json,application/json"
            style="display: none"
          />
        </p>
        <div id="eventsSection" class="events-section">
          <h2>Navigation Events</h2>
          <div id="eventsList" class="events-list"></div>
        </div>
      </aside>
    </main>

    <script type="module" src="../../src/replay-tool.ts"></script>
  </body>
</html>
