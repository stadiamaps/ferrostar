name: Check for Typos

on:
  pull_request:

jobs:
  typos:
    runs-on: macos-15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-ios-swiftformat
      cancel-in-progress: true

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Run typos
      uses: crate-ci/typos@master
